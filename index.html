const typeLabels = {
  daily: "Daily Briefing",
  weekly: "Weekly Review",
  deepdive: "Deep Dive",
  story: "The Keeping House",
  bonus: "Bonus"
};
const typeBadgeClass = {
  daily: "badge-daily",
  weekly: "badge-weekly",
  deepdive: "badge-deepdive",
  story: "badge-story",
  bonus: "badge-bonus"
};

let activeFilter = "all";
let currentlyPlaying = null;
const audio = document.getElementById("globalAudio");

// Build filter buttons
function buildFilters() {
  const counts = { all: episodes.length };
  episodes.forEach(ep => { counts[ep.type] = (counts[ep.type] || 0) + 1; });
  const filtersEl = document.getElementById("filters");
  const types = ["all", "daily", "weekly", "deepdive", "story", "bonus"];
  const labels = { all: "All Episodes", ...typeLabels };
  types.forEach(t => {
    if (t !== "all" && !counts[t]) return;
    const btn = document.createElement("button");
    btn.className = "filter-btn" + (t === activeFilter ? " active" : "");
    btn.innerHTML = labels[t] + '<span class="count">' + (counts[t] || 0) + '</span>';
    btn.onclick = () => {
      activeFilter = t;
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      renderEpisodes();
    };
    filtersEl.appendChild(btn);
  });
}

// Format seconds to mm:ss
function fmtTime(s) {
  if (isNaN(s)) return "0:00";
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ":" + (sec < 10 ? "0" : "") + sec;
}

// Parse chapter timestamp to seconds
function parseTimestamp(ts) {
  const parts = ts.split(":");
  return parseInt(parts[0]) * 3600 + parseInt(parts[1]) * 60 + parseInt(parts[2]);
}

// Render episode list
function renderEpisodes() {
  const container = document.getElementById("episodes");
  const filtered = activeFilter === "all" ? episodes : episodes.filter(ep => ep.type === activeFilter);

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results"><p>No episodes in this category yet.</p></div>';
    return;
  }

  container.innerHTML = filtered.map((ep, i) => {
    const idx = episodes.indexOf(ep);
    const chapLines = ep.chapters ? ep.chapters.split("\n").filter(Boolean) : [];
    const chapHTML = chapLines.length > 0
      ? '<div class="chapters"><div class="chapters-title">Chapters</div>' +
        chapLines.map(line => {
          const spaceIdx = line.indexOf(" ", 9);
          const time = line.substring(0, spaceIdx !== -1 ? spaceIdx : 8);
          const label = line.substring(spaceIdx !== -1 ? spaceIdx + 1 : 9);
          return '<div class="chapter-line" onclick="seekTo(' + idx + ',' + parseTimestamp(time) + ')"><span class="chapter-time">' + time.substring(0, 5) + '</span>' + label + '</div>';
        }).join("") +
        '</div>'
      : '';
    return '<div class="episode-card" data-type="' + ep.type + '">' +
      '<img class="episode-art" src="' + ep.art + '" alt="" loading="lazy">' +
      '<div class="episode-info">' +
        '<div class="episode-meta">' +
          '<span class="badge ' + typeBadgeClass[ep.type] + '">' + typeLabels[ep.type] + '</span>' +
          '<span class="episode-date">' + ep.date + '</span>' +
        '</div>' +
        '<div class="episode-title">' + ep.title + '</div>' +
        '<div class="episode-desc">' + ep.desc + '</div>' +
        '<div class="player-row">' +
          '<button class="play-btn" id="playbtn-' + idx + '" onclick="togglePlay(' + idx + ')">' +
            '<svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>' +
            '<svg class="icon-pause" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>' +
          '</button>' +
          '<div class="player-progress" id="progress-' + idx + '" onclick="seekClick(event,' + idx + ')">' +
            '<div class="player-progress-fill" id="fill-' + idx + '"></div>' +
          '</div>' +
          '<span class="player-time" id="time-' + idx + '">' + ep.duration + '</span>' +
        '</div>' +
        '<div class="episode-duration">' + ep.duration + '</div>' +
        '<button class="show-notes-toggle" id="toggle-' + idx + '" onclick="toggleNotes(' + idx + ')">' +
          'Show Notes ' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>' +
        '</button>' +
        '<div class="show-notes" id="notes-' + idx + '">' +
          ep.notes +
          chapHTML +
        '</div>' +
      '</div>' +
    '</div>';
  }).join("");
}

// Audio player logic
function togglePlay(idx) {
  const ep = episodes[idx];
  const btn = document.getElementById("playbtn-" + idx);

  if (currentlyPlaying === idx) {
    if (audio.paused) {
      audio.play();
      btn.classList.add("playing");
    } else {
      audio.pause();
      btn.classList.remove("playing");
    }
    return;
  }

  // Stop previous
  if (currentlyPlaying !== null) {
    const prevBtn = document.getElementById("playbtn-" + currentlyPlaying);
    if (prevBtn) prevBtn.classList.remove("playing");
    const prevFill = document.getElementById("fill-" + currentlyPlaying);
    if (prevFill) prevFill.style.width = "0%";
  }

  currentlyPlaying = idx;
  audio.src = ep.audio;
  audio.play();
  btn.classList.add("playing");
}

function seekTo(idx, seconds) {
  if (currentlyPlaying !== idx) {
    togglePlay(idx);
  }
  audio.currentTime = seconds;
}

function seekClick(e, idx) {
  if (currentlyPlaying !== idx) {
    togglePlay(idx);
    return;
  }
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
}

// Update progress bar
audio.addEventListener("timeupdate", () => {
  if (currentlyPlaying === null) return;
  const fill = document.getElementById("fill-" + currentlyPlaying);
  const timeEl = document.getElementById("time-" + currentlyPlaying);
  if (fill && audio.duration) {
    fill.style.width = (audio.currentTime / audio.duration * 100) + "%";
  }
  if (timeEl) {
    timeEl.textContent = fmtTime(audio.currentTime) + " / " + fmtTime(audio.duration);
  }
});

audio.addEventListener("ended", () => {
  if (currentlyPlaying !== null) {
    const btn = document.getElementById("playbtn-" + currentlyPlaying);
    if (btn) btn.classList.remove("playing");
    const fill = document.getElementById("fill-" + currentlyPlaying);
    if (fill) fill.style.width = "0%";
    currentlyPlaying = null;
  }
});

function toggleNotes(idx) {
  const notes = document.getElementById("notes-" + idx);
  const toggle = document.getElementById("toggle-" + idx);
  notes.classList.toggle("open");
  toggle.classList.toggle("open");
  toggle.innerHTML = (notes.classList.contains("open") ? "Hide Notes " : "Show Notes ") +
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>';
}

// Init
buildFilters();
renderEpisodes();
</script>
